[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://seitrack.vercel.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false          # ← IMPORTANTE: solo admins crean usuarios
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = false
enable_confirmations = true
secure_password_change = true

[functions.crear-usuario]
verify_jwt = true              # valida el Bearer token del caller

[functions.notify-maintenance]
verify_jwt = false             # corre por cron, sin token de usuario
