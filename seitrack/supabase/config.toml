[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
port = 54321
site_url = "https://seitrack.vercel.app"
additional_redirect_urls = ["https://seitrack.vercel.app/**", "http://localhost:5173/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

# ── CAMBIO CLAVE ──────────────────────────────────────────────────────────────
# enable_signup = true  → permite auto-registro para bomberos (@aerocivil.gov.co)
# La validación del dominio la hace el frontend + el trigger en la BD
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
enable_confirmations = true   # requiere confirmar email antes de entrar
secure_password_change = true
double_confirm_changes = false

[functions.crear-usuario]
verify_jwt = false

[functions.notify-maintenance]
verify_jwt = false
